# EDIT THIS FILE TO CUSTOMIZE YOUR APPLICATION DEPLOYMENT

# Configuration for your workload instance on the deployer PaaS:
# - EnvironmentID: pam-mice-7f3da
# - ProductID: 25086
# - AWSWorkloadAccountID: 649941507750
# - AWSWorkloadRegion: us-east-1
# - CloudflareZone: apps.mckinsey.com

image:
  repository: mckinsey-pam-mice-docker-local.jfrog.io/pam-mice-starter-app
  tag: 0.0.0-061b9fe2  # pinned to the exact image built & scanned in CI
  pullPolicy: IfNotPresent

cloudflareZone: apps.mckinsey.com
subdomainPrefix: pam-mice
ingressClass: nginx

labels:
  app.kubernetes.io/namespace-owner: "lrah-control-plane"
  app.kubernetes.io/lrah-user-product-id: 25086
  app.kubernetes.io/lrah-user-environment-id: pam-mice-7f3da

imagePullSecrets:
  - name: jfrog-pam-mice-7f3da-secret

env:
  NODE_ENV: production

#
## For all databases you define in terraform/main.tf
#
### On AWS RDS:
# Database: pam-mice-7f3da-<dbname>
### On Kubernetes (in your namespace):
# ConfigMaps:
# - postgresql-databases-pam-mice-7f3da-<dbname>
# Secrets:
# - postgresql-roles-pam-mice-7f3da-<dbname>
#
# Example database configuration:
# deployer:
#   dbConfigMap: postgresql-databases-pam-mice-7f3da-<dbname>
#   dbSecret: postgresql-roles-pam-mice-7f3da-<dbname>
#   dbName: pam-mice-7f3da-<dbname>
#   dbRole: owner
#
## For all S3 buckets you define in terraform/main.tf:
#
### On AWS:
# S3 bucket: 649941507750-pam-mice-7f3da-<bucketname>
# IAM roles:
# - s3ReadWriteRoleARN: arn:aws:iam::649941507750:role/S3-649941507750-pam-mice-7f3da-<bucketname>-ReadWrite
# - s3ReadRoleARN: arn:aws:iam::649941507750:role/S3-649941507750-pam-mice-7f3da-<bucketname>-Read
#
# Example service account with IAM role (IRSA):
# deployer:
#   saReadWriteRoleARN: arn:aws:iam::649941507750:role/SA-649941507750-pam-mice-7f3da-ReadWrite
#
# Example external URL for your application:
# deployer:
#   externalURL: https://pam-mice-7f3da.apps.mckinsey.com/
#
## For SQS queues you define in terraform/main.tf:
# Queue name: 649941507750-pam-mice-7f3da-<queuename>
#
